dialog:
  id: "0"
  title: Ordering food
  icon: "🍕"
  iconBg: "#FEF3C7"
  description: Customer and waiter have a conversation in a restaurant.

  ###
  roles:
    - &ROLE_A Customer
    - &ROLE_B Waiter

  ###
  variables:
    name: subject
    values:
      - variableId: 0
        text: Menu
      - variableId: 1
        text: Bill

  ###
  sequences:
    - &SEQ_0
      seq: 0
      role: *ROLE_A
      multiText:
        -
          variableId: 0
          text: &FLOW_SELECT_ROW_0 Can I have a menu please ?
        -
          variableId: 1
          text: May I have a bill please ?

    - &SEQ_1_FLOW_0
      seq: 1
      role: *ROLE_B
      multiText:
        - text: &FLOW_SELECT_ROW_1_0 Yes sure.

    - &SEQ_1_FLOW_1
      seq: 1
      role: *ROLE_B
      multiText:
        - text: &FLOW_SELECT_ROW_1_1 Not right now.

  ###
  flowsSelection:
      row0:
        role: *ROLE_A
        text:
          *FLOW_SELECT_ROW_0
      row1:
        role: *ROLE_B
        flowOptions:
          - flowId: 0
            text: *FLOW_SELECT_ROW_1_0
          - flowId: 1
            text: *FLOW_SELECT_ROW_1_1

  flows:
    - id: 0
      sentences:
        - *SEQ_0
        - *SEQ_1_FLOW_0
    - id: 1
      sentences:
        - *SEQ_0
        - *SEQ_1_FLOW_1