dialog:
  id: "1"
  title: Ordering food
  icon: "🍕"
  iconBg: "#FEF3C7"
  description: Customer and waiter have a conversation in a restaurant.

  ###
  roles:
    - &ROLE_A Customer
    - &ROLE_B Waiter

  ###
  variables:
    name: subject
    values:
      - variableId: 0
        text: Menu
      - variableId: 1
        text: Bill

  ###
  sequences:
    - &SEQ_0
      seq: 0
      role: *ROLE_A
      multiText:
        -
          variableId: 0
          text: Can I have a menu please ?
        -
          variableId: 1
          text: May I have a bill please ?

    - &SEQ_1
      seq: 1
      role: *ROLE_B
      multiText:
        - text: Yes sure.

  flows:
    - id: 0
      sentences:
        - *SEQ_0
        - *SEQ_1
